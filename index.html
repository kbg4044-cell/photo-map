<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조별 포토맵</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Malgun Gothic',sans-serif;background:#0f0f1a;color:#fff;height:100vh;display:flex;flex-direction:column}
    header{padding:10px 16px;background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    header h1{font-size:1rem;font-weight:500}
    .badge{background:rgba(255,255,255,.1);padding:3px 10px;border-radius:20px;font-size:.78rem;color:#ccc}
    #filters{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
    .fbtn{border:none;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:600;opacity:.4;transition:.15s;color:#fff}
    .fbtn.on{opacity:1}
    .fbtn.all{background:rgba(255,255,255,.2);color:#fff;opacity:1}
    .fbtn.all.on{background:rgba(255,255,255,.35)}
    #map{flex:1}
    .cm{border:2.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer;color:#fff}
    .leaflet-popup-content{margin:10px 12px}
    .pw{width:230px}
    .ptag{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;color:#fff;margin-bottom:6px;font-weight:600}
    .ph-wrap img{width:100%;height:155px;object-fit:cover;display:block;cursor:zoom-in;border-radius:8px}
    .ph-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 0 2px}
    .ph-btn{border:none;color:#fff;border-radius:6px;padding:3px 12px;cursor:pointer;font-size:14px;font-weight:700}
    .ph-cnt{font-size:12px;color:#666}
    .pname{font-size:.78rem;font-weight:600;color:#222;margin:4px 0 2px;word-break:break-all}
    .pdate{font-size:.73rem;color:#666}
    .pcoord{font-size:.7rem;color:#999;margin-top:1px}
    #lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    #lb.on{display:flex}
    #lb img{max-width:92vw;max-height:74vh;border-radius:10px}
    #lb .lmeta{background:rgba(255,255,255,.12);padding:7px 18px;border-radius:20px;font-size:.82rem;text-align:center}
    #lb .lcls{position:absolute;top:16px;right:20px;font-size:1.7rem;cursor:pointer;opacity:.7}
    #lb .lnav{display:flex;gap:14px}
    #lb .lnav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 22px;border-radius:20px;cursor:pointer;font-size:.95rem}
    #lb .lnav button:hover{background:rgba(255,255,255,.28)}
  </style>
</head>
<body>
<header>
  <h1>📸 조별 포토맵</h1>
  <span class="badge" id="cnt">불러오는 중...</span>
</header>
<div id="filters"></div>
<div id="map"></div>
<div id="lb">
  <span class="lcls" onclick="closeLb()">✕</span>
  <img id="lb-img" src="" alt="">
  <div class="lmeta" id="lb-meta"></div>
  <div class="lnav">
    <button onclick="lbMove(-1)">◀ 이전</button>
    <button onclick="lbMove(1)">다음 ▶</button>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const allClusters   = [[{"name": "20260329_124944 - 김보근.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/A조/20260329_124944 - 김보근.jpg", "date": "", "group": "A조", "color": "#E24B4A"}, {"name": "20260329_124945.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/A조/20260329_124945.jpg", "date": "", "group": "A조", "color": "#E24B4A"}, {"name": "20260329_124944.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/B조/20260329_124944.jpg", "date": "", "group": "B조", "color": "#EF9F27"}, {"name": "1774490980582.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/C조/1774490980582.jpg", "date": "", "group": "C조", "color": "#1D9E75"}], [{"name": "IMG_0284 - 박소정.jpeg", "lat": 35.157669, "lng": 129.120072, "url": "photos/A조/IMG_0284 - 박소정.jpeg", "date": "", "group": "A조", "color": "#E24B4A"}, {"name": "IMG_0336 - 박소정.jpeg", "lat": 35.157842, "lng": 129.120256, "url": "photos/A조/IMG_0336 - 박소정.jpeg", "date": "", "group": "A조", "color": "#E24B4A"}], [{"name": "IMG_0315 - 박소정.jpeg", "lat": 35.142617, "lng": 129.116347, "url": "photos/A조/IMG_0315 - 박소정.jpeg", "date": "", "group": "A조", "color": "#E24B4A"}]];
const groupClusters = [[{"name": "20260329_124944 - 김보근.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/A조/20260329_124944 - 김보근.jpg", "date": "", "group": "A조", "color": "#E24B4A"}, {"name": "20260329_124945.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/A조/20260329_124945.jpg", "date": "", "group": "A조", "color": "#E24B4A"}], [{"name": "IMG_0284 - 박소정.jpeg", "lat": 35.157669, "lng": 129.120072, "url": "photos/A조/IMG_0284 - 박소정.jpeg", "date": "", "group": "A조", "color": "#E24B4A"}, {"name": "IMG_0336 - 박소정.jpeg", "lat": 35.157842, "lng": 129.120256, "url": "photos/A조/IMG_0336 - 박소정.jpeg", "date": "", "group": "A조", "color": "#E24B4A"}], [{"name": "IMG_0315 - 박소정.jpeg", "lat": 35.142617, "lng": 129.116347, "url": "photos/A조/IMG_0315 - 박소정.jpeg", "date": "", "group": "A조", "color": "#E24B4A"}], [{"name": "20260329_124944.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/B조/20260329_124944.jpg", "date": "", "group": "B조", "color": "#EF9F27"}], [{"name": "1774490980582.jpg", "lat": 35.233911, "lng": 128.884517, "url": "photos/C조/1774490980582.jpg", "date": "", "group": "C조", "color": "#1D9E75"}]];
const total = 7;
const GROUP_COLORS = {"A조": "#E24B4A", "B조": "#EF9F27", "C조": "#1D9E75", "D조": "#378ADD", "E조": "#7F77DD", "F조": "#D4537E"};
const groups = Object.keys(GROUP_COLORS);

let lbList=[], lbIdx=0;
let activeGroup='all';
let markerLayers=[];
const map=L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

function openLb(list,idx){
  lbList=list; lbIdx=idx; updateLb();
  document.getElementById('lb').classList.add('on');
}
function updateLb(){
  const p=lbList[lbIdx];
  document.getElementById('lb-img').src=p.url;
  document.getElementById('lb-meta').textContent=
    '['+p.group+'] '+p.name+(p.date?' · '+p.date:'')+' ('+(lbIdx+1)+'/'+lbList.length+')';
}
function lbMove(d){lbIdx=(lbIdx+d+lbList.length)%lbList.length;updateLb();}
function closeLb(){document.getElementById('lb').classList.remove('on');}
document.getElementById('lb').addEventListener('click',e=>{if(e.target.id==='lb')closeLb();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')lbMove(-1);
  if(e.key==='ArrowRight')lbMove(1);
});

function makePopup(photos, idx, pid){
  const p=photos[idx];
  const pj=JSON.stringify(photos);
  const n=photos.length;
  const color=p.color;

  const tags=[...new Set(photos.map(x=>x.group))].map(g=>
    `<span class="ptag" style="background:${GROUP_COLORS[g]||'#888'}">${g}</span>`
  ).join(' ');

  let nav='';
  if(n>1){
    nav=`<div class="ph-nav">
      <button class="ph-btn" style="background:${color}" onclick="window.${pid}(-1)">◀</button>
      <span class="ph-cnt">${idx+1} / ${n}</span>
      <button class="ph-btn" style="background:${color}" onclick="window.${pid}(1)">▶</button>
    </div>`;
  }
  return `<div class="pw">
    <div style="margin-bottom:4px">${tags}</div>
    <div class="ph-wrap">
      <img src="${p.url}" onerror="this.style.display='none'"
           onclick='openLb(${pj},${idx})'>
    </div>
    ${nav}
    <div class="pname">${p.name}</div>
    <div class="pdate">${p.date||'날짜 없음'}</div>
    <div class="pcoord">${p.lat}, ${p.lng}</div>
  </div>`;
}

function renderMarkers(clusters){
  markerLayers.forEach(m=>map.removeLayer(m));
  markerLayers=[];
  const bounds=[];

  clusters.forEach((photos,ci)=>{
    const lat=photos.reduce((s,p)=>s+p.lat,0)/photos.length;
    const lng=photos.reduce((s,p)=>s+p.lng,0)/photos.length;
    const n=photos.length;
    const color=photos[0].color;
    const sz=n>1?38:14;

    const icon=L.divIcon({
      className:'',
      html:n>1
        ?`<div class="cm" style="width:${sz}px;height:${sz}px;background:${color}">${n}</div>`
        :`<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });

    const marker=L.marker([lat,lng],{icon}).addTo(map);
    markerLayers.push(marker);
    bounds.push([lat,lng]);

    let cur=0;
    const pid='fn'+ci+'_'+Date.now();
    window[pid]=function(d){
      cur=(cur+d+n)%n;
      marker.getPopup().setContent(makePopup(photos,cur,pid));
    };
    marker.bindPopup(makePopup(photos,0,pid),{maxWidth:270});
  });

  if(bounds.length===1) map.setView(bounds[0],15);
  else if(bounds.length>1) map.fitBounds(bounds,{padding:[40,40]});

  const pc=clusters.reduce((s,c)=>s+c.length,0);
  document.getElementById('cnt').textContent='📍 '+pc+'장 / '+clusters.length+'곳'+(activeGroup!=='all'?' ['+activeGroup+']':'');
}

function setFilter(g){
  activeGroup=g;
  if(g==='all'){
    renderMarkers(allClusters);
  }else{
    const filtered=groupClusters.filter(c=>c[0].group===g);
    renderMarkers(filtered);
  }
  document.querySelectorAll('.fbtn').forEach(b=>{
    b.classList.toggle('on', b.dataset.g===g);
  });
}

const filtersEl=document.getElementById('filters');
const allBtn=document.createElement('button');
allBtn.className='fbtn all on';
allBtn.textContent='전체';
allBtn.dataset.g='all';
allBtn.onclick=()=>setFilter('all');
filtersEl.appendChild(allBtn);

groups.forEach(g=>{
  const btn=document.createElement('button');
  btn.className='fbtn';
  btn.style.background=GROUP_COLORS[g];
  btn.textContent=g;
  btn.dataset.g=g;
  btn.onclick=()=>setFilter(g);
  filtersEl.appendChild(btn);
});

if(allClusters.length){
  renderMarkers(allClusters);
}else{
  document.getElementById('cnt').textContent='사진 없음';
  document.getElementById('map').innerHTML='<p style="text-align:center;padding:80px;color:#555">조별 폴더에 GPS 사진을 올려보세요!</p>';
  document.getElementById('filters').style.display='none';
}
</script>
</body>
</html>
