name: 포토맵 자동 생성

on:
  push:
    paths:
      - 'photos/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python으로 HTML 생성
        run: python generate_map.py

      - name: index.html 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "지도 자동 업데이트"
          git push
